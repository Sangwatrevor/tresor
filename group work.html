<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bmi check</title>
</head>
<body>
    <h1>BMI RESULT</h1>
    <script>
        let height=parseFloat(prompt("Enter your height in meters (example:1.70)"));
        let weight=parseFloat(prompt("Enter your weight in kg"));

        if (height >0 && weight >0){
            let bmi=weight/(height*height);
            if(bmi <18.5){
                document.write("result, underweight");
            }else if (bmi <25 ){
                document.write("result, normal weight");
            }else{
                document.write("result, overweight");
            }
        }else{
            document.write("invalid input");
        }
    </script>
    
</body>
</html>
